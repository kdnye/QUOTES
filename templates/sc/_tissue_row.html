{# Single tissue row used both inline (initial state) and as the HTMX
   partial returned by /sc/quote/tissue-row and /sc/quote/tissue-lookup.
   Expected context: leg (int), i (int), prefill (SCTissueCode | None) #}
<tr>
  <td>
    <input class="form-control form-control-sm"
           name="tissue_code_{{ leg }}_{{ i }}"
           value="{{ prefill.tissue_code if prefill else '' }}"
           hx-get="{{ url_for('science_care.sc_tissue_lookup_partial') }}"
           hx-trigger="change delay:250ms"
           hx-target="closest tr"
           hx-swap="outerHTML"
           hx-vals='{"leg": {{ leg }}, "i": {{ i }} }'
           placeholder="e.g. PELV03"
           autocomplete="off" />
  </td>
  <td>
    <input class="form-control form-control-sm bg-body-tertiary"
           name="tissue_description_{{ leg }}_{{ i }}"
           value="{{ prefill.description if prefill else '' }}"
           readonly />
  </td>
  <td>
    <input class="form-control form-control-sm"
           type="number"
           min="0"
           step="1"
           name="qty_{{ leg }}_{{ i }}"
           value="{{ 1 if prefill else '' }}" />
  </td>
  <td>
    <input class="form-control form-control-sm bg-body-tertiary"
           name="unit_weight_{{ leg }}_{{ i }}"
           value="{{ '%.2f'|format(prefill.unit_weight_lb) if prefill else '' }}"
           readonly />
  </td>
  <td>
    <input class="form-control form-control-sm bg-body-tertiary"
           name="default_box_{{ leg }}_{{ i }}"
           value="{{ prefill.default_box_type_code if prefill else '' }}"
           readonly />
  </td>
</tr>
