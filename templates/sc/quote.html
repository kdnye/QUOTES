{% extends "base.html" %}

{% block title %}Science Care Multi-Lab Quote{% endblock %}

{# Force HTMX to parse swap responses inside a <template> fragment.
   Without this, a response that mixes a <tr> main swap with sibling
   OOB <div>s (subtotals, box-count grid, per-section pills) trips
   the browser's table-foster-parenting rule: <div> is invalid inside
   <tbody>, so the parser yanks the divs out of the table HTMX
   synthesised to host the <tr>, and the main <tr> swap silently
   stops applying. Using <template> as the parse context removes the
   table restriction so both the row and the OOB divs land cleanly. #}
{% block head %}
  <meta name="htmx-config" content='{"useTemplateFragments":true}'>
{% endblock %}

{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-end mb-3">
  <div>
    <h1 class="h3 mb-1">Science Care Multi-Lab Quote</h1>
    <p class="text-body-secondary mb-0">
      Quote up to {{ leg_count }} shipment legs in one pass. Each leg is
      priced as the cheapest of Air, Hotshot, or your Established Lane
      rate (with the SC-to-SC routing override).
    </p>
  </div>
  <div class="d-flex gap-2">
    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('science_care.sc_lab_defaults_form') }}">
      Set default labs
    </a>
    {% if current_user.is_sc_admin or current_user.is_admin %}
    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('science_care.sc_reference_index') }}">
      Manage reference data
    </a>
    {% endif %}
  </div>
</div>

<datalist id="sc-lab-codes">
  {% for lab in labs %}
  <option value="{{ lab.lab_code }}" label="{{ lab.lab_name or '' }}"></option>
  {% endfor %}
</datalist>

<datalist id="sc-tissue-codes">
  {% for tissue in tissue_codes %}
  <option value="{{ tissue.tissue_code }}" label="{{ tissue.description or '' }}"></option>
  {% endfor %}
</datalist>

<form id="sc-form" method="post" action="{{ url_for('science_care.sc_quote_submit') }}">
  {{ csrf_input() }}

  <div class="row g-3 mb-3 align-items-end">
    <div class="col-md-6 col-lg-4">
      <label for="sc-multi-reference" class="form-label">
        Multi-leg reference
        <span class="text-body-secondary fw-normal">(optional)</span>
      </label>
      <input type="text"
             class="form-control"
             id="sc-multi-reference"
             name="multi_reference"
             maxlength="57"
             autocomplete="off"
             placeholder="Auto-assign (SCMQ0001…)"
             value="{{ request.form.get('multi_reference', '') }}">
      <div class="form-text">
        Leave blank to auto-assign the next <code>SCMQNNNN</code>
        number. Stamps every leg's quote and the booking email so ops
        can look up the full shipment by one reference.
      </div>
    </div>
    <div class="col-md-6 col-lg-4">
      <a class="btn btn-outline-secondary"
         href="{{ url_for('science_care.sc_quote_lookup_form') }}">
        Look up an existing multi-leg quote
      </a>
    </div>
  </div>

  <div class="accordion mb-4" id="sc-shipments">
    {% for leg in legs %}
    <div class="accordion-item">
      <h2 class="accordion-header" id="sc-leg-heading-{{ leg }}">
        <button class="accordion-button {% if not loop.first %}collapsed{% endif %}"
                type="button" data-bs-toggle="collapse"
                data-bs-target="#sc-leg-{{ leg }}"
                aria-expanded="{{ 'true' if loop.first else 'false' }}"
                aria-controls="sc-leg-{{ leg }}">
          <span class="me-3 fw-semibold">SHIPMENT {{ leg }}</span>
          {# Lab value resolution: if the form was POSTed (key present in
             request.form), trust its value as-is - including the empty
             string, since clearing a slot is an intentional override.
             Only fall back to the saved default when the field was NEVER
             submitted (initial GET / first page load). #}
          {% set lab_key = 'lab_code_' ~ leg %}
          {% set dest_key = 'dest_zip_' ~ leg %}
          {% if lab_key in request.form %}
            {% set leg_lab_value = request.form.get(lab_key) %}
          {% else %}
            {% set leg_lab_value = default_labs_by_leg.get(leg, '') %}
          {% endif %}
          {% set leg_dest_value = request.form.get(dest_key, '') %}
          <span id="sc-leg-summary-{{ leg }}" class="small text-body-secondary">
            <span id="sc-leg-summary-lab-{{ leg }}"
                  data-placeholder="Lab">{{ leg_lab_value or 'Lab' }}</span>
            <span class="mx-1">—</span>
            <span id="sc-leg-summary-dest-{{ leg }}"
                  data-placeholder="Destination">{{ leg_dest_value or 'Destination' }}</span>
            <span class="mx-1">—</span>
            <span id="sc-leg-summary-winner-{{ leg }}"
                  data-placeholder="Rate (Type)">Rate (Type)</span>
          </span>
        </button>
      </h2>
      <div id="sc-leg-{{ leg }}"
           class="accordion-collapse collapse {% if loop.first %}show{% endif %}"
           aria-labelledby="sc-leg-heading-{{ leg }}">
        <div class="accordion-body">
          <div class="row g-3 mb-3">
            <div class="col-12 col-md-3">
              <label class="form-label" for="lab_code_{{ leg }}">SC Lab</label>
              <input class="form-control"
                     list="sc-lab-codes"
                     id="lab_code_{{ leg }}"
                     name="lab_code_{{ leg }}"
                     value="{{ leg_lab_value }}"
                     data-mirror-target="#sc-leg-summary-lab-{{ leg }}"
                     hx-get="{{ url_for('science_care.sc_lab_lookup_partial') }}"
                     hx-trigger="change delay:200ms"
                     hx-target="#sc-lab-origin-{{ leg }}"
                     hx-swap="innerHTML"
                     hx-vals='{"leg": {{ leg }}}'
                     autocomplete="off" />
              <small id="sc-lab-origin-{{ leg }}" class="form-text text-body-secondary"></small>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label" for="dest_zip_{{ leg }}">Destination ZIP</label>
              <input class="form-control"
                     id="dest_zip_{{ leg }}"
                     name="dest_zip_{{ leg }}"
                     value="{{ leg_dest_value }}"
                     data-mirror-target="#sc-leg-summary-dest-{{ leg }}"
                     data-sc-dest-zip="{{ leg }}"
                     inputmode="numeric"
                     pattern="\d{5}"
                     maxlength="5"
                     hx-get="{{ url_for('science_care.sc_dest_zip_notes_partial') }}"
                     hx-trigger="change delay:200ms, keyup changed delay:400ms"
                     hx-target="#dest-zip-notes-{{ leg }}"
                     hx-swap="outerHTML"
                     hx-vals='{"leg": {{ leg }}}' />
              <small id="dest_city_state_{{ leg }}"
                     class="form-text text-body-secondary sc-dest-city-state"
                     data-leg="{{ leg }}"
                     data-placeholder="City, State will appear here">City, State will appear here</small>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label" for="routing_type_{{ leg }}">Shipment type</label>
              <select class="form-select"
                      id="routing_type_{{ leg }}"
                      name="routing_type_{{ leg }}">
                <option value="">— select —</option>
                <option>Outbound</option>
                <option>SC to SC</option>
                <option>Inbound</option>
              </select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label" for="temp_mode_{{ leg }}">Mode</label>
              <select class="form-select"
                      id="temp_mode_{{ leg }}"
                      name="temp_mode_{{ leg }}">
                <option value="" selected>— select —</option>
                <option value="frozen">Frozen</option>
                <option value="rtu">Ready to Use</option>
              </select>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label" for="intl_country_{{ leg }}">International country (skip if filled)</label>
              <input class="form-control"
                     id="intl_country_{{ leg }}"
                     name="intl_country_{{ leg }}"
                     placeholder="e.g. France" />
            </div>
            <div class="col-12">
              <div class="form-check">
                {% set is_return_key = 'is_return_' ~ leg %}
                {% set leg_is_return = request.form.get(is_return_key) in ('Y', 'on', 'true', '1') %}
                <input class="form-check-input"
                       type="checkbox"
                       value="Y"
                       id="is_return_{{ leg }}"
                       name="is_return_{{ leg }}"
                       {% if leg_is_return %}checked{% endif %} />
                <label class="form-check-label" for="is_return_{{ leg }}">
                  This is a return
                  <span class="text-body-secondary fw-normal">
                    (quotes from the destination ZIP back to the lab)
                  </span>
                </label>
              </div>
            </div>
          </div>

          {# Destination ZIP shipment-notes banner. Empty container on
             first render (and on dest-ZIP clears) - HTMX swaps the
             whole div via outerHTML the moment the dest ZIP changes,
             mirroring the source workbook's airport / cargo warning
             row that appears between origin/dest and the accessorial
             checklist. #}
          {% include "sc/_dest_zip_notes.html" with context %}

          <fieldset class="mb-3">
            <legend class="h6">Accessorials</legend>
            <div class="alert alert-warning py-2 mb-3" role="note">
              <strong>Heads-up:</strong> These ancillary fees apply for both RETURNS &amp; PICK-UPS.
            </div>
            <div class="d-flex flex-wrap gap-3">
              {% for field, label, cost_label in accessorials %}
              <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       value="Y"
                       id="acc_{{ field }}_{{ leg }}"
                       name="acc_{{ field }}_{{ leg }}" />
                <label class="form-check-label" for="acc_{{ field }}_{{ leg }}">
                  {{ label }}{% if cost_label %}
                  <span class="text-body-secondary">({{ cost_label }})</span>
                  {% endif %}
                </label>
              </div>
              {% endfor %}
            </div>
          </fieldset>

          {# Tissue + Boxes + Consumables subtotals all read from the
             same `subtotals_initial` dict so the Shipment-weight card
             below can paint a consistent breakdown on first render. #}
          {% set leg_result = (
              results.legs[leg - 1]
              if results and results.legs|length >= leg
              else none
          ) %}
          {% set subtotals_initial = sc_initial_subtotals_for_leg(leg_result) %}

          <div class="mb-2 d-flex justify-content-between align-items-center">
            <h3 class="h6 mb-0">Tissue items</h3>
            <button type="button"
                    class="btn btn-sm btn-outline-primary sc-add-tissue"
                    data-leg="{{ leg }}"
                    hx-get="{{ url_for('science_care.sc_tissue_row_partial') }}"
                    hx-target="#tissue-rows-{{ leg }} tbody"
                    hx-swap="beforeend"
                    hx-vals='{"leg": {{ leg }}, "i": 2}'>
              + Add tissue row
            </button>
          </div>

          <div id="tissue-rows-{{ leg }}" class="table-responsive">
            <table class="table table-sm align-middle">
              <thead>
                <tr>
                  <th style="width:14%">Tissue code</th>
                  <th style="width:24%">Description</th>
                  <th style="width:8%">Qty</th>
                  <th style="width:10%" title="Per-piece average weight">Avg lbs</th>
                  <th style="width:10%" title="Qty × Avg lbs">Total lbs</th>
                  <th style="width:8%" title="Total lbs × 0.4536, rounded to whole kg">Total kg</th>
                  <th style="width:26%">Box</th>
                </tr>
              </thead>
              <tbody>
                {% with i = 1,
                        prefill = None,
                        code = "",
                        qty_for_row = 0,
                        capacities = {},
                        recommended_box_code = None,
                        recommended_pieces_per_box = 0,
                        user_box_pick = "" %}
                  {% include "sc/_tissue_row.html" %}
                {% endwith %}
              </tbody>
            </table>
          </div>
          {% with section = "tissue",
                  label = "Tissue",
                  weight_lb = subtotals_initial.tissue_lb %}
            {% include "sc/_section_subtotal.html" %}
          {% endwith %}

          {# Static box-sizing guidance lifted verbatim from the source
             workbook. Sits between the tissue rows and the Boxes
             section so the operator sees it while deciding whether to
             override the auto-allocated box counts. #}
          <div class="alert alert-info py-2 mt-3 mb-2" role="note">
            <p class="mb-1"><strong>Always quote the larger size</strong> if it shows a specimen can ship in two different sizes. <em>Ex: 1 can ship in L and 1 in XL box — quote XL box.</em></p>
            <p class="mb-0">If shipping multiple tissue types together and it's not intuitive, <strong>ask the lab how they would package</strong> / for total wt.</p>
          </div>

          <fieldset class="mb-3 mt-3">
            <legend class="h6">Boxes</legend>
            <p class="small text-body-secondary mb-2">
              These counts auto-fill from the tissue rows above as you
              type. Override any cell to keep the box arrangement you
              want — your typed values are preserved on subsequent
              recomputes.
            </p>
            {% with box_values = sc_box_values_for_leg(box_types, leg_result) %}
              {% include "sc/_box_count_inputs.html" %}
            {% endwith %}
            {% with section = "box",
                    label = "Box tare",
                    weight_lb = subtotals_initial.box_tare_lb %}
              {% include "sc/_section_subtotal.html" %}
            {% endwith %}
          </fieldset>

          <fieldset class="mb-3">
            <legend class="h6">Consumables</legend>
            <p class="small text-body-secondary mb-2">
              Defaults: <strong>Frozen</strong> legs get
              <em>1 domestic dry ice per box</em> and
              <strong>Ready to Use</strong> legs get
              <em>1 domestic gel pack per box</em> automatically.
              Override by typing a number — including <code>0</code>
              to suppress the default for a specific row. Non-matching
              consumables stay at 0 unless you enter a Qty.
            </p>
            {% with consumable_values = sc_consumable_values_for_leg(leg_result) %}
              {% include "sc/_consumable_qty_inputs.html" %}
            {% endwith %}
            {% with section = "consumable",
                    label = "Consumables",
                    weight_lb = subtotals_initial.consumable_lb %}
              {% include "sc/_section_subtotal.html" %}
            {% endwith %}
          </fieldset>

          {# Per-leg weight subtotals: matches the client workbook's
             TOTAL SHIPMENT WEIGHT block. Recaps the three section
             subtotals + adds a TOTAL. The box-counts HTMX endpoint
             emits this as an OOB swap so the numbers stay in sync. #}
          {% with subtotals = subtotals_initial %}
            {% include "sc/_leg_weight_subtotals.html" %}
          {% endwith %}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

  <div class="d-flex gap-3">
    <button class="btn btn-primary"
            type="submit"
            hx-post="{{ url_for('science_care.sc_quote_calculate') }}"
            hx-include="#sc-form"
            hx-target="#sc-results"
            hx-swap="innerHTML"
            hx-indicator="#sc-quote-spinner">
      Generate quotes
    </button>
    <span id="sc-quote-spinner" class="htmx-indicator align-self-center small text-body-secondary">
      Running 14 quotes…
    </span>
  </div>
</form>

{% if maps_api_key %}
<script
  src="https://maps.googleapis.com/maps/api/js?key={{ maps_api_key|urlencode }}&callback=initScDestCityState"
  async
  defer
></script>
{% endif %}

<section id="sc-results" class="mt-4">
  {% if results %}
    {% with session=results.session,
           legs=results.legs,
           grand_total=results.grand_total,
           skipped=results.skipped,
           embedded=True %}
      {% include "sc/_results_partial.html" %}
    {% endwith %}
  {% endif %}
</section>

<script>
  // HTMX CSRF wiring lives in base.html now (every page that loads
  // HTMX gets it for free).

  // Update each "Add tissue row" button's hx-vals before the request so
  // the new row's index reflects the current count.
  document.querySelectorAll(".sc-add-tissue").forEach((button) => {
    button.addEventListener("htmx:configRequest", (event) => {
      const leg = parseInt(button.dataset.leg, 10);
      const tbody = document.querySelector(`#tissue-rows-${leg} tbody`);
      const nextIndex = (tbody ? tbody.children.length : 0) + 1;
      event.detail.parameters.leg = leg;
      event.detail.parameters.i = nextIndex;
    });
  });

  // Live-mirror lab + dest inputs into the accordion header summary.
  // Each input declares its target via data-mirror-target. Empty values
  // fall back to data-placeholder on the target span.
  document.querySelectorAll("[data-mirror-target]").forEach((input) => {
    const target = document.querySelector(input.dataset.mirrorTarget);
    if (!target) return;
    const placeholder = target.dataset.placeholder || target.textContent;
    const sync = () => {
      const value = input.value.trim();
      target.textContent = value || placeholder;
    };
    input.addEventListener("input", sync);
    sync(); // paint once at page load so prefills show immediately.
  });

  // Destination ZIP -> City, State readout via Google Maps Geocoder.
  // Cached per process to avoid hammering the API as the user fans out
  // the same ZIPs across multiple legs. Geocoder is only created after
  // the Maps JS API finishes loading (initScDestCityState callback).
  const scZipCityStateCache = new Map();
  let scGeocoder = null;
  const scPendingZipLookups = [];

  function scSetCityStateText(leg, message, isError) {
    const target = document.getElementById(`dest_city_state_${leg}`);
    if (!target) return;
    target.textContent = message;
    target.classList.toggle("text-danger", Boolean(isError));
    target.classList.toggle("text-body-secondary", !isError);
  }

  function scResetCityState(leg) {
    const target = document.getElementById(`dest_city_state_${leg}`);
    if (!target) return;
    target.textContent = target.dataset.placeholder || "";
    target.classList.remove("text-danger");
    target.classList.add("text-body-secondary");
  }

  function scExtractCityState(results) {
    if (!Array.isArray(results) || results.length === 0) return null;
    const components = results[0].address_components || [];
    let city = "";
    let state = "";
    for (const component of components) {
      const types = component.types || [];
      if (!city && (types.includes("locality") || types.includes("postal_town"))) {
        city = component.long_name || "";
      }
      if (!city && !state && types.includes("sublocality")) {
        city = component.long_name || "";
      }
      if (!state && types.includes("administrative_area_level_1")) {
        state = component.short_name || component.long_name || "";
      }
    }
    if (!city) {
      for (const component of components) {
        const types = component.types || [];
        if (types.includes("administrative_area_level_2") || types.includes("neighborhood")) {
          city = component.long_name || "";
          break;
        }
      }
    }
    if (!city && !state) return null;
    return { city, state };
  }

  function scLookupCityState(leg, zip) {
    if (scZipCityStateCache.has(zip)) {
      const cached = scZipCityStateCache.get(zip);
      if (cached) {
        scSetCityStateText(leg, `${cached.city}, ${cached.state}`.replace(/^, |, $/g, ""), false);
      } else {
        scSetCityStateText(leg, "No city/state found for this ZIP", true);
      }
      return;
    }
    if (!scGeocoder) {
      // Maps JS not ready yet; queue and let initScDestCityState flush.
      scPendingZipLookups.push({ leg, zip });
      scSetCityStateText(leg, "Looking up city/state…", false);
      return;
    }
    scSetCityStateText(leg, "Looking up city/state…", false);
    scGeocoder.geocode(
      {
        address: zip,
        componentRestrictions: { country: "US", postalCode: zip },
      },
      (results, status) => {
        if (status !== "OK") {
          scZipCityStateCache.set(zip, null);
          scSetCityStateText(leg, "No city/state found for this ZIP", true);
          return;
        }
        const parts = scExtractCityState(results);
        if (!parts) {
          scZipCityStateCache.set(zip, null);
          scSetCityStateText(leg, "No city/state found for this ZIP", true);
          return;
        }
        scZipCityStateCache.set(zip, parts);
        scSetCityStateText(leg, `${parts.city}, ${parts.state}`.replace(/^, |, $/g, ""), false);
      }
    );
  }

  // Maps JS API callback - wires up the geocoder and flushes any
  // ZIP lookups that the user kicked off before the script finished
  // loading.
  window.initScDestCityState = function () {
    if (!window.google || !google.maps) return;
    scGeocoder = new google.maps.Geocoder();
    while (scPendingZipLookups.length) {
      const { leg, zip } = scPendingZipLookups.shift();
      scLookupCityState(leg, zip);
    }
  };

  document.querySelectorAll("[data-sc-dest-zip]").forEach((input) => {
    const leg = input.dataset.scDestZip;
    let debounceTimer = null;
    const handle = () => {
      window.clearTimeout(debounceTimer);
      const digits = (input.value || "").replace(/\D/g, "");
      if (digits.length !== 5) {
        scResetCityState(leg);
        return;
      }
      debounceTimer = window.setTimeout(() => scLookupCityState(leg, digits), 250);
    };
    input.addEventListener("input", handle);
    input.addEventListener("change", handle);
    // Paint once on load so a prefilled ZIP resolves without a keystroke.
    if ((input.value || "").replace(/\D/g, "").length === 5) {
      handle();
    }
  });

  // Update each tissue row's "Total lbs" / "Total kg" cells immediately
  // on qty change. The unit (per-piece) weight rides on the row as a
  // data-unit-weight attribute set when the tissue code was looked up.
  // Without this, the user would only see the new line total after the
  // server round-trip that refreshes the row - the leg's box-counts
  // OOB swap doesn't repaint the tissue rows.
  const LB_TO_KG = 0.453592;
  document.addEventListener("input", (event) => {
    const target = event.target;
    if (!target || !target.classList || !target.classList.contains("sc-qty-input")) {
      return;
    }
    const row = target.closest("tr");
    if (!row) return;
    const unitWeight = parseFloat(row.dataset.unitWeight || "0");
    const qty = parseInt(target.value || "0", 10) || 0;
    const totalLbs = unitWeight * qty;
    const lbsCell = row.querySelector(".sc-line-total-lbs");
    const kgCell = row.querySelector(".sc-line-total-kg");
    if (lbsCell) {
      lbsCell.value = totalLbs > 0 ? totalLbs.toFixed(1) : "";
    }
    if (kgCell) {
      kgCell.value = totalLbs > 0
        ? Math.round(totalLbs * LB_TO_KG).toString()
        : "";
    }
  });
</script>
{% endblock %}
