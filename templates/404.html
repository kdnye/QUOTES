{% extends "base.html" %}
{% block title %}404 – Not Found{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5 text-center">
  <img src="{{ url_for('theme.static', filename='error.png') }}" alt="Gone fishin' – page not found" class="img-fluid mb-0" style="max-width:480px;">
  <h1 class="display-1 fw-bold mt-0" style="line-height:1;">404</h1>
  <p class="text-muted mt-2">{{ message or "The page you're looking for doesn't exist or has been moved." }}</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">Go Home</a>
</div>
{% endblock %}
