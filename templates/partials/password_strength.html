{% macro password_strength_ui(password_id, confirm_id=None) %}
<div id="{{ password_id }}_strength" class="mt-2" aria-live="polite">
  <ul class="list-unstyled mb-1 small" id="{{ password_id }}_checklist">
    <li id="{{ password_id }}_r_len"  class="text-body-secondary"><i class="bi bi-dash-circle me-1"></i>At least 12 characters</li>
    <li id="{{ password_id }}_r_upper" class="text-body-secondary"><i class="bi bi-dash-circle me-1"></i>Uppercase letter (A–Z)</li>
    <li id="{{ password_id }}_r_lower" class="text-body-secondary"><i class="bi bi-dash-circle me-1"></i>Lowercase letter (a–z)</li>
    <li id="{{ password_id }}_r_numsym" class="text-body-secondary"><i class="bi bi-dash-circle me-1"></i>Number or symbol</li>
  </ul>
  <div id="{{ password_id }}_passphrase" class="badge bg-success d-none">Passphrase mode — length alone is enough</div>
</div>
{% if confirm_id %}
<div id="{{ confirm_id }}_match" class="form-text mt-1" aria-live="polite"></div>
{% endif %}
<script>
(function () {
  var pwEl = document.getElementById({{ password_id | tojson }});
  {% if confirm_id %}
  var cfEl = document.getElementById({{ confirm_id | tojson }});
  var matchEl = document.getElementById({{ (confirm_id ~ '_match') | tojson }});
  {% endif %}
  var rules = {
    len:    document.getElementById({{ (password_id ~ '_r_len')    | tojson }}),
    upper:  document.getElementById({{ (password_id ~ '_r_upper')  | tojson }}),
    lower:  document.getElementById({{ (password_id ~ '_r_lower')  | tojson }}),
    numsym: document.getElementById({{ (password_id ~ '_r_numsym') | tojson }}),
  };
  var ppBadge = document.getElementById({{ (password_id ~ '_passphrase') | tojson }});

  function setRule(el, ok) {
    el.className = ok ? 'text-success' : 'text-body-secondary';
    el.querySelector('i').className = ok ? 'bi bi-check-circle-fill me-1' : 'bi bi-dash-circle me-1';
  }

  function evaluate() {
    var pw = pwEl ? pwEl.value : '';
    var passphrase = pw.length >= 28;
    var hasLen    = pw.length >= 12;
    var hasUpper  = /[A-Z]/.test(pw);
    var hasLower  = /[a-z]/.test(pw);
    var hasNumSym = /[0-9]|[^a-zA-Z0-9]/.test(pw);

    if (passphrase) {
      ppBadge.classList.remove('d-none');
      setRule(rules.len,    true);
      setRule(rules.upper,  true);
      setRule(rules.lower,  true);
      setRule(rules.numsym, true);
    } else {
      ppBadge.classList.add('d-none');
      setRule(rules.len,    hasLen);
      setRule(rules.upper,  hasUpper);
      setRule(rules.lower,  hasLower);
      setRule(rules.numsym, hasNumSym);
    }

    {% if confirm_id %}
    checkMatch();
    {% endif %}
  }

  {% if confirm_id %}
  function checkMatch() {
    if (!cfEl || !cfEl.value) { matchEl.textContent = ''; return; }
    var match = pwEl && pwEl.value === cfEl.value;
    matchEl.textContent = match ? '✓ Passwords match' : '✗ Passwords do not match';
    matchEl.className = 'form-text mt-1 ' + (match ? 'text-success' : 'text-danger');
  }
  if (cfEl) cfEl.addEventListener('input', checkMatch);
  {% endif %}

  if (pwEl) pwEl.addEventListener('input', evaluate);
})();
</script>
{% endmacro %}
