name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quotes
          POSTGRES_PASSWORD: quotes
          POSTGRES_DB: quotes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quotes -d quotes_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_USER: quotes
      POSTGRES_PASSWORD: quotes
      POSTGRES_DB: quotes_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      TEST_DATABASE_URL: postgresql+psycopg2://quotes:quotes@localhost:5432/quotes_test
      DATABASE_URL: postgresql+psycopg2://quotes:quotes@localhost:5432/quotes_test
      SECRET_KEY: ci-test-secret
      MIGRATE_ON_STARTUP: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        # -n auto runs one worker per CPU; --dist=loadfile keeps tests
        # from the same file on the same worker so each file's app
        # fixture only migrates the schema once. conftest provisions
        # per-worker databases on demand so workers don't collide on
        # the autouse schema-reset fixture.
        run: pytest -q -n auto --dist=loadfile
